<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <link rel="stylesheet" href="assets/css/style.css">


  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body class="content">

  <!--Inicio do main-->
  <main class="container">

    <!--Inicio do aside-->
    <aside>
      <img src="assets/images/illustration-article.svg" alt="Imagen com fundo brano, amarelo e preto com um simbolo de maior e menor e entre eles uma barra" id="img-principal">

      <p class="box">Learning</p>

      <p class="publicacao">Published 21 Dec 2023</p>
    </aside>
    <!--Fim do aside-->

    <!--Inicio do artile-->
    <article>
      <h1> HTML & CSS foundations</h1>

      <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </article>
    <!--Fim do article-->

    <!--Inicio do footer-->
    <footer>
      <img src="assets/images/image-avatar.webp" alt="Imagem de Greg Hooper vestido com uma camisa azul e ao fundo temos uma parede de tijolos brancos">

      <p>Greg Hooper</p>
    </footer>
    <!--Fim do footer-->
  </main>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </main>

</html>
